name: Tests

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm test:unit run

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_ENV: test
      BETTER_AUTH_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/test
      BETTER_AUTH_SECRET: test
      GOOGLE_CLIENT_ID: xxx
      GOOGLE_CLIENT_SECRET: xxx
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright browser (Chromium only)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        timeout-minutes: 12
        env:
          # Abort a stalled download (Playwright has no read timeout by default)
          # so the retry loop below can recover instead of hanging the whole job.
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "120000"
          # Log each download/extract step so that if it still wedges (the hang
          # happens right after the chrome zip hits 100%), the log pinpoints the
          # exact post-download operation that blocks.
          DEBUG: "pw:install"
        run: |
          for attempt in 1 2 3; do
            echo "::group::Playwright browser install (attempt $attempt)"
            if timeout 300 pnpm exec playwright install chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt stalled or failed; retrying..."
            sleep 5
          done
          echo "Playwright browser install failed after 3 attempts" >&2
          exit 1

      - name: Start Test DB
        run: docker compose up -d --wait db_test

      - name: Run migrations
        run: pnpm db:migrate

      - name: Build app
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
